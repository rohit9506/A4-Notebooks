<!DOCTYPE html>
<html>
<head>
  <title>Contact</title>

  <style>
    /* =========================
       Global
    ========================= */
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #f5f7fa;
    }

    /* =========================
       Navigation (REFERENCE HOME PAGE)
    ========================= */
    .Links {
      text-align: center;
      background-color: #D18B5A;
      padding: 14px 0;
    }

    .Links a {
      margin: 0 14px;
      text-decoration: none;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .Links a:hover {
      color: #E8F041;
    }

    /* =========================
       Contact Content Card
    ========================= */
    .contact-container {
      max-width: 700px;
      margin: 80px auto;
      background-color: #ffffff;
      padding: 45px 55px;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.2);
    }

    .contact-container h2 {
      text-align: center;
      color: #1F4E79;
      font-size: 32px;
      margin-bottom: 30px;
      font-weight: normal;
    }

    .contact-item {
      font-size: 16px;
      color: #333;
      margin-bottom: 18px;
    }

    .contact-item span {
      font-weight: 600;
      color: #0D0D0D;
    }

    .contact-item a {
      color: #1F4E79;
      text-decoration: none;
    }

    .contact-item a:hover {
      text-decoration: underline;
    }

    /* =========================
       Footer (REFERENCE HOME PAGE)
    ========================= */
    footer {
      text-align: center;
      background-color: #D18B5A;
      padding: 12px 0;
      margin-top: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #0D0D0D;
    }
	/* =========================
   Page Background Image
========================= */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;

  /* Apply the generated background image */
  background-image: url("Images/background imag.png"); /* <-- update path */
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
/* Header & Footer clean look */
.Links,
footer {
  background-color: rgba(209, 139, 90, 0.95); /* soft brown */
  backdrop-filter: blur(2px);
}
/* Content containers */
.product-card,
.about-container,
figure,
.notebook-card {
  background-color: rgba(255, 255, 255, 0.92);
}

  </style>
</head>

<body>

  <!-- Header -->
  <div class="Links">
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="support.html">Support</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Contact Section -->
  <div class="contact-container">
    <h2>Contact</h2>

    <div class="contact-item">
      <span>Name:</span> Rohit Patel
    </div>

    <div class="contact-item">
      <span>Email:</span>
      <a href="mailto:rprohit989207@gmail.com">rprohit989207@gmail.com</a>
    </div>

    <div class="contact-item">
      <span>Contact:</span> 8097056445
    </div>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2025 Notebooks Store
  </footer>

</body>
</html>
