<!DOCTYPE html>
<html>
<head>
  <title>Support</title>

  <style>
    /* =========================
       Global
    ========================= */
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #f5f7fa;
    }

    /* =========================
       Navigation (REFERENCE HOME PAGE)
    ========================= */
    .Links {
      text-align: center;
      background-color: #D18B5A;
      padding: 14px 0;
    }

    .Links a {
      margin: 0 14px;
      text-decoration: none;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .Links a:hover {
      color: #E8F041;
    }

    /* =========================
       Support Content Card
    ========================= */
    .support-container {
      max-width: 800px;
      margin: 80px auto;
      background-color: #ffffff;
      padding: 45px 55px;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .support-container h2 {
      color: #1F4E79;
      font-size: 32px;
      margin-bottom: 18px;
      font-weight: normal;
    }

    .support-container p {
      font-size: 16px;
      color: #333;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .redirect {
      display: inline-block;
      padding: 12px 35px;
      background: linear-gradient(135deg, #9acd32, #6b8e23);
      color: #000;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      border-radius: 25px;
      transition: all 0.3s ease;
    }

    .redirect:hover {
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.3);
    }

    /* =========================
       Footer (REFERENCE HOME PAGE)
    ========================= */
    footer {
      text-align: center;
      background-color: #D18B5A;
      padding: 12px 0;
      margin-top: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #0D0D0D;
    }
	/* =========================
   Page Background Image
========================= */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;

  /* Apply the generated background image */
  background-image: url("Images/background imag.png"); /* <-- update path */
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
/* Header & Footer clean look */
.Links,
footer {
  background-color: rgba(209, 139, 90, 0.95); /* soft brown */
  backdrop-filter: blur(2px);
}
/* Content containers */
.product-card,
.about-container,
figure,
.notebook-card {
  background-color: rgba(255, 255, 255, 0.92);
}


  </style>
</head>

<body>

  <!-- Header -->
  <div class="Links">
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="support.html">Support</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Support Section -->
  <div class="support-container">
    <h2>Support</h2>
    <p>
      We’re here to help. If you have any questions, issues, or need assistance with
      our notebooks, feel free to reach out to us. Our support team is always ready
      to provide guidance and solutions.
    </p>

    <a class="redirect" href="Contact.html">Contact Us</a>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2025 Notebooks Store
  </footer>

</body>
</html>
