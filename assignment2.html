<!DOCTYPE html>
<html>
<head>
  <title>Buy Now</title>

  <style>
    /* =========================
       Global
    ========================= */
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f5f7fa;
    }

    /* =========================
       Navigation (MATCHED WITH HOME)
    ========================= */
    .Links {
      text-align: center;
      background-color: #D18B5A;
      padding: 14px 0;
    }

    .Links a {
      margin: 0 14px;
      text-decoration: none;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .Links a:hover {
      color: #E8F041;
    }

    /* =========================
       Product Card
    ========================= */
    .product-card {
      max-width: 420px;
      margin: 60px auto;
      background-color: #ffffff;
      padding: 35px 30px;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    /* =========================
       Image Box
    ========================= */
    .image-box {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 25px;
      border-radius: 18px;
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 14px 32px rgba(0,0,0,0.25);
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    /* =========================
       Hover Details (IMAGE ONLY)
    ========================= */
    .hover-details {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.8),
        rgba(0,0,0,0.25)
      );
      color: white;
      display: flex;
      align-items: flex-end;
      padding: 15px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.35s ease;
    }

    .image-box:hover img {
      transform: scale(1.08);
    }

    .image-box:hover .hover-details {
      opacity: 1;
      transform: translateY(0);
    }

    /* =========================
       Text
    ========================= */
    .title {
      font-size: 28px;
      color: #1F4E79;
      margin-bottom: 8px;
      font-weight: normal;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #6A5ACD;
      margin-bottom: 28px;
    }

    /* =========================
       Button
    ========================= */
    .buy-btn {
      display: inline-block;
      padding: 12px 42px;
      background: linear-gradient(135deg, #9acd32, #6b8e23);
      color: black;
      font-size: 16px;
      font-weight: 600;
      border-radius: 25px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .buy-btn:hover {
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.3);
    }

    /* =========================
       Footer (MATCHED WITH HOME)
    ========================= */
    footer {
      text-align: center;
      background-color: #D18B5A;
      padding: 12px 0;
      margin-top: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #0D0D0D;
    }

/* =========================
   Page Background Image
========================= */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;

  /* Apply the generated background image */
  background-image: url("Images/background imag.png"); /* <-- update path */
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
/* Header & Footer clean look */
.Links,
footer {
  background-color: rgba(209, 139, 90, 0.95); /* soft brown */
  backdrop-filter: blur(2px);
}
/* Content containers */
.product-card,
.about-container,
figure,
.notebook-card {
  background-color: rgba(255, 255, 255, 0.92);
}


  </style>
</head>

<body>

  <!-- Navigation -->
  <div class="Links">
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="support.html">Support</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Product Card -->
  <div class="product-card">

    <div class="image-box">
      <img src="Images/2book.jpg" alt="A4 Notebook">

      <div class="hover-details">
        Premium A4 notebook with smooth paper, strong binding,
        and durable cover — ideal for students and office use.
      </div>
    </div>

    <div class="title">A4 Notebook</div>
    <div class="price">₹50</div>

    <a href="Buynow.html" class="buy-btn">Buy Now</a>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2025 Notebooks Store
  </footer>

</body>
</html>
